<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyCapsule</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <section class="pd-login">
      <div class="border-bbox">
        <div class="pd-contained">
          <!-- left -->
          <div class="pd-left-data">
            <img class="pd-image1" src="image.png" alt="image" />
            <div class="pd-content">
              <h3>Let's Grow up Your Future with StudyCapsule</h3>
              <br />
              <p>
                Learn important new skills, discover passions <br />
                or hobbins, find ideas to change your careers
              </p>
            </div>
          </div>

          <!-- right -->
          <div class="pd-form">
            <form action="" method="post">
              <h2 class="pd-heading2">Study Capsule</h2>
              <br />
              <h3 class="pd-heading3">Verify Gmail</h3>
              <br />
              <label for="email">Email Address</label><br />
              <input
                type="email"
                name="email"
                placeholder="Enter your email"
                required
              /><br /><br />
              <button class="btn4" type="submit">Send OTP</button>
              <br />
              <br />
              <label for="otp">Enter OTP</label><br />
              <input
                type="text"
                name="otp"
                placeholder="Enter OTP"
                required
              /><br /><br />

              <a href="changePassword.html"
                ><button class="btn4" type="submit">Verify OTP</button></a
              >

              <br /><br />
            </form>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
