<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyCapsule</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <section class="pd-login">
      <div class="border-bbox">
        <div class="pd-contained">
          <!-- left -->
          <div class="pd-left-data">
            <img class="pd-image1" src="image.png" alt="image" />
            <div class="pd-content">
              <h3>Let's Grow up Your Future with StudyCapsule</h3>
              <br />
              <p>
                Learn important new skills, discover passions <br />
                or hobbins, find ideas to change your careers
              </p>
            </div>
          </div>

          <!-- right -->
          <div class="pd-form">
            <form action="" method="post">
              <h2 class="pd-heading2">Study Capsule</h2>
              <br />
              <h3 class="pd-heading3">Create a New Account</h3>
              <br />

              <label for="name">Full Name</label><br />
              <input
                type="text"
                name="name"
                placeholder="Enter your full name"
                required
              /><br /><br />

              <label for="mobile">Mobile Number</label><br />
              <input
                type="tel"
                name="mobile"
                placeholder="Enter your mobile number"
                required
              /><br /><br />
              <label for="email">Email Address</label><br />
              <input
                type="email"
                name="email"
                placeholder="Enter your email"
                required
              /><br /><br />

              <label for="password">Password</label><br />
              <input
                type="password"
                name="password"
                placeholder="Enter your password"
                required
              /><br /><br />
              <a href="#"><button class="btn1" type="submit">Submit</button></a>
              <div class="signup">
                Don't have an account?<a href="login.html"> Log in</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
