<!doctype html>
<html lang="en">
  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyCapsule</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <section class="pd-login">
      <div class="border-bbox">
        <div class="pd-contained">
          <!-- left -->
          <div class="pd-left-data">
            <img class="pd-image1" src="image.png" alt="image" />
            <div class="pd-content">
              <h3>Let's Grow up Your Future with StudyCapsule</h3>
              <br />
              <p>
                Learn important new skills, discover passions <br />
                or hobbins, find ideas to change your careers
              </p>
            </div>
          </div>

          <!-- right -->
          <div class="pd-form">
            <form action="" method="post">
              <h2 class="pd-heading2">Study Capsule</h2>
              <br />
              <h3 class="pd-heading3">Change Password</h3>
              <br />
              <label for="email">Enter Password</label><br />
              <input
                type="password"
                name="password"
                placeholder="Enter your password"
                required
              /><br /><br />

              <br />
              <label for="Confirm Password">Confirm Password</label><br />
              <input
                type="password"
                name="otp"
                placeholder="Re-enter your passowrd"
                required
              /><br /><br />

              <a href="#"><button class="btn4" type="submit">Submit</button></a>

              <br /><br />
            </form>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
