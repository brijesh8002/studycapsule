<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Multi Level Dropdown</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f5f5;
            padding: 100px;
        }

        .dropdown-submenu {
            position: relative;
        }

        /* Desktop */
        @media (min-width:992px) {
            .dropdown-submenu>.dropdown-menu {
                position: absolute;
                top: 0;
                left: 100%;
                margin-top: -1px;
                display: none;
            }
        }

        /* Mobile */
        @media (max-width:991px) {
            .dropdown-submenu>.dropdown-menu {
                position: static !important;
                margin-left: 15px;
                border: none;
                box-shadow: none;
                display: none;
            }
        }

        .dropdown-submenu>.dropdown-menu.show {
            display: block;
        }

        .submenu-toggle::after {
            content: "▶";
            float: right;
            font-size: 11px;
        }

        .dropdown-menu {
            min-width: 220px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="btn-group">

        <button class="btn btn-danger dropdown-toggle"
                data-bs-toggle="dropdown"
                data-bs-auto-close="outside">
            Categories
        </button>

        <ul class="dropdown-menu">
            <!-- Level 1 -->
            <li class="dropdown-submenu">

                <a href="#" class="dropdown-item submenu-toggle">
                    Electronics
                </a>

                <ul class="dropdown-menu">

                    <li><a class="dropdown-item" href="#">TV</a></li>

                    <!-- Level 2 -->
                    <li class="dropdown-submenu">

                        <a href="#" class="dropdown-item submenu-toggle">
                            Mobiles
                        </a>

                        <ul class="dropdown-menu">

                            <li><a class="dropdown-item" href="#">Samsung</a></li>
                            <li><a class="dropdown-item" href="#">Apple</a></li>
                            <li><a class="dropdown-item" href="#">OnePlus</a></li>

                            <!-- Level 3 -->
                            <li class="dropdown-submenu">

                                <a href="#" class="dropdown-item submenu-toggle">
                                    Accessories
                                </a>

                                <ul class="dropdown-menu">

                                    <li><a class="dropdown-item" href="#">Charger</a></li>
                                    <li><a class="dropdown-item" href="#">Cover</a></li>
                                    <li><a class="dropdown-item" href="#">Power Bank</a></li>

                                </ul>

                            </li>

                        </ul>

                    </li>
                    <!-- Level 2 -->
                    <li class="dropdown-submenu">

                        <a href="#" class="dropdown-item submenu-toggle">
                            Mobiles
                        </a>

                        <ul class="dropdown-menu">

                            <li><a class="dropdown-item" href="#">Samsung</a></li>
                            <li><a class="dropdown-item" href="#">Apple</a></li>
                            <li><a class="dropdown-item" href="#">OnePlus</a></li>

                            <!-- Level 3 -->
                            <li class="dropdown-submenu">

                                <a href="#" class="dropdown-item submenu-toggle">
                                    Accessories
                                </a>

                                <ul class="dropdown-menu">

                                    <li><a class="dropdown-item" href="#">Charger</a></li>
                                    <li><a class="dropdown-item" href="#">Cover</a></li>
                                    <li><a class="dropdown-item" href="#">Power Bank</a></li>

                                </ul>

                            </li>

                        </ul>

                    </li>

                    

                </ul>

            </li>
        </ul>

    </div>


</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.querySelectorAll(".submenu-toggle").forEach(function (item) {

    item.addEventListener("click", function (e) {

        e.preventDefault();
        e.stopPropagation();

        let submenu = this.nextElementSibling;

        // Close sibling submenu only
        let parent = this.parentElement.parentElement;

        parent.querySelectorAll(":scope > .dropdown-submenu > .dropdown-menu").forEach(function (menu) {

            if (menu !== submenu) {
                menu.classList.remove("show");
            }

        });

        submenu.classList.toggle("show");

    });

});


// Close submenus only inside current dropdown
document.querySelectorAll(".btn-group").forEach(function(group){

    group.addEventListener("hidden.bs.dropdown", function(){

        this.querySelectorAll(".dropdown-menu.show").forEach(function(menu){

            if(!menu.parentElement.classList.contains("dropdown")){
                menu.classList.remove("show");
            }

        });

    });

});
</script>

</body>
</html>
